{% extends "base.html" %}
{% block title %}Register — CRC Portal{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card animate-in">
        <div class="logo-area">
            <h1>⚡ CRC Portal</h1>
            <p>Create a new account</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}" data-validate>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username"
                    required autofocus>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                    placeholder="Create a strong password" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                    placeholder="Repeat your password" required>
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <select class="form-control" id="role" name="role">
                    <option value="student">Student</option>
                    <option value="leader">Leader</option>
                    <option value="staff">Staff</option>
                    <option value="crc_head">CRC Head</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">
                📝 Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account?
            <a href="{{ url_for('auth.login') }}">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
